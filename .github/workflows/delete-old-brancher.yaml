name: Delete Old Branches

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to confirm deletion of old branches"
        required: true
        default: "NO"

jobs:
  find-and-delete:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all branches

      - name: Find branches older than 1 year
        id: old_branches
        run: |
          # Get current date minus 1 year
          cutoff=$(date -d "yesterday" +%s)

          echo "Branches older than 1 year:"
          old_branches=()
          for branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/); do
            last_commit=$(git log -1 --format=%ct $branch || echo 0)
            if [ "$last_commit" -lt "$cutoff" ]; then
              echo "$branch"
              old_branches+=("$branch")
            fi
          done

          # Save to output (comma-separated)
          echo "branches=$(IFS=,; echo "${old_branches[*]}")" >> $GITHUB_OUTPUT

      - name: Require confirmation
        if: ${{ github.event.inputs.confirm != 'YES' }}
        run: |
          echo "You must confirm deletion by typing YES in the workflow_dispatch input."
          echo "Branches that would be deleted: ${{ steps.old_branches.outputs.branches }}"
          exit 1

      - name: Delete old branches
        if: ${{ github.event.inputs.confirm == 'YES' && steps.old_branches.outputs.branches != '' }}
        run: |
          IFS=',' read -ra BRANCHES <<< "${{ steps.old_branches.outputs.branches }}"
          for branch in "${BRANCHES[@]}"; do
            b=${branch#origin/} # strip origin/
            if [[ "$b" != "main" ]]; then
              echo "Deleting branch: $b"
              git push origin --delete "$b" || true
            fi
          done
