name: Archive Old Branches

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to confirm archiving of old branches"
        required: true
        default: "NO"

jobs:
  archive-old-branches:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all branches

      - name: Find branches older than 1 year
        id: old_branches
        run: |
          cutoff=$(date -d "1 year ago" +%s)

          echo "Branches older than 1 year:"
          old_branches=()
          for branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/); do
            echo "$branch"
            old_branches+=("$branch")
          done

          echo "branches=$(IFS=,; echo "${old_branches[*]}")" >> $GITHUB_OUTPUT

      - name: Archive old branches
        if: ${{ steps.old_branches.outputs.branches != '' }}
        run: |
          IFS=',' read -ra BRANCHES <<< "${{ steps.old_branches.outputs.branches }}"
          for branch in "${BRANCHES[@]}"; do
            b=${branch#origin/} # strip origin/
            if [[ "$b" != "main" && "$b" != "master" && "$b" != archive/* ]]; then
              archive_name="archive/$b"
              echo "Renaming branch $b to $archive_name"
              git branch -m "$b" "$archive_name"
              git push origin "$archive_name"
              git push origin --delete "$b"  # remove old branch from remote
            fi
          done
