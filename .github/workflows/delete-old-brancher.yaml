name: Archive old Branches

on:
  workflow_dispatch:

jobs:
  find-and-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all branches

      - name: Find branches older than 1 year
        id: old_branches
        run: |
          # Get current date minus 1 year
          cutoff=$(date -d "today" +%s)

          echo "Branches older than 1 year:"
          old_branches=()
          for branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/); do
            b=${branch#origin/} # strip origin/
            last_commit=$(git log -1 --format=%ct $branch || echo 0)
            if [ "$b" != "main" && "$b" != archive/* && "$last_commit" -lt "$cutoff" ]; then
              archive_name="archive/$b"
              echo "Renaming branch $b to $archive_name"
              git branch -m "$b" "$archive_name"
              git push origin "$archive_name"
              git push origin --delete "$b"  # remove old branch from remote
            fi
          done
